# ── runitownit.com — React frontend ──────────────────────────────────────────
server {
    listen 80;
    server_name runitownit.com www.runitownit.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name runitownit.com www.runitownit.com;

    ssl_certificate     /etc/letsencrypt/live/runitownit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/runitownit.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/runitownit/html;
    index index.html;

    # Single-page app — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── api.runitownit.com — Spring Boot backend ─────────────────────────────────
server {
    listen 80;
    server_name api.runitownit.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.runitownit.com;

    ssl_certificate     /etc/letsencrypt/live/api.runitownit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.runitownit.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
